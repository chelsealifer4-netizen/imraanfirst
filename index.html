<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NSU E/MBA CGPA Estimator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Josefin Sans';
background:linear-gradient(135deg,#0b1f3a,#123a7a);
color:white;
display:flex;
justify-content:center;
padding:20px;
}

/* CONTAINER */
.container{
width:720px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:10px;
}
.header img{
width:70px;
margin-bottom:5px;
}

h1{
color:#66b2ff;
margin:5px 0;
}

.sub{
font-size:13px;
color:#ccc;
}

/* NAV */
.nav{
text-align:center;
margin:15px 0;
}
.nav a{
margin:5px;
padding:8px 14px;
background:#66b2ff;
border-radius:20px;
color:white;
text-decoration:none;
transition:0.3s;
}
.nav a:hover{
background:#3399ff;
}

/* GRID */
.grid{
display:flex;
gap:15px;
}

/* PANEL */
.panel{
width:50%;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:12px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* SELECT */
.selects{
display:flex;
gap:5px;
margin-bottom:10px;
}
select{
flex:1;
padding:6px;
border-radius:6px;
border:none;
}

/* COURSE LIST */
.course-container{
max-height:220px;
overflow-y:auto;
}

.row{
display:flex;
gap:5px;
margin:5px 0;
}
.row select{flex:1;}

button{
padding:6px 8px;
border:none;
border-radius:6px;
background:#66b2ff;
color:white;
cursor:pointer;
}
.clear{background:#ff5252;}

.btns{
text-align:center;
margin-top:10px;
}

/* RESULT */
.result{
display:flex;
justify-content:space-between;
background:#ffffff20;
padding:10px;
border-radius:10px;
margin-top:10px;
font-weight:bold;
}
.cgpa{color:#00e676;}

/* PROGRESS */
.progress-bar{
height:10px;
background:#ccc;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}
.progress-fill{
height:100%;
background:#00e676;
width:0%;
transition:0.5s;
}

.progress-item{
margin:6px 0;
}

.done{color:#00e676;}
.notdone{color:#ff5252;}

.status{
margin-top:10px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/en/4/4a/North_South_University_logo.png">
<h1>NSU E/MBA CGPA Estimator</h1>
<div class="sub">Initiated and Developed by MBA & EMBA Program</div>
</div>

<!-- NAV -->
<div class="nav">
<a href="index.html">Home</a>
<a href="flowchart.html">Course Flowchart</a>
<a href="gpolicy.html">Grading Policy</a>
<a href="help.html">User Guideline</a>
<a href="https://www.northsouth.edu/academic/sbe/mba-emba/" target="_blank">Official Website</a>
</div>

<div class="grid">

<!-- LEFT -->
<div class="panel">

<div class="selects">
<select id="program" onchange="resetAll()">
<option value="">Program</option>
<option value="MBA">MBA</option>
<option value="EMBA">EMBA</option>
</select>

<select id="batch" onchange="resetAll()">
<option value="new">After 2019</option>
<option value="old">2019 or Previous</option>
</select>
</div>

<div class="course-container" id="rows"></div>

<div class="btns">
<button onclick="addRow()">+ Add Course</button>
<button class="clear" onclick="clearAll()">Clear</button>
</div>

<div class="result">
<div>CGPA: <span class="cgpa" id="cgpa">0.00</span></div>
<div>Credits: <span id="credits">0</span></div>
</div>

</div>

<!-- RIGHT -->
<div class="panel">

<h3 style="text-align:center;">Progress</h3>

<div class="progress-bar">
<div class="progress-fill" id="bar"></div>
</div>

<div id="progress"></div>
<div class="status" id="status"></div>

</div>

</div>

</div>

<script>

let gradeMap={"A":4,"A-":3.7,"B+":3.3,"B":3,"B-":2.7,"C+":2.3,"C":2,"F":0};

function getCourses(){
let p=document.getElementById("program").value;
let b=document.getElementById("batch").value;

if(p==="MBA"){
if(b==="old") return ["BUS 500","BUS 501","BUS 505","BUS 511","BUS 516","BUS 518","BUS 520","BUS 525","BUS 530","BUS 601","BUS 620","BUS 635","BUS 650","BUS 685","BUS 690","BUS 698","Open Elective 1","Open Elective 2","MAJOR1","MAJOR2","MAJOR3","MAJOR4","MAJOR5","MAJOR6","MAJOR7","MAJOR8"];
return ["BUS 500","BUS 501","BUS 505","BUS 511","BUS 516","BUS 518","BUS 520","BUS 525","BUS 530","BUS 535","BUS 601","BUS 620","BUS 635","BUS 650","BUS 685","BUS 690","BUS 699","Open Elective","MAJOR1","MAJOR2","MAJOR3","MAJOR4","MAJOR5","MAJOR6","MAJOR7","MAJOR8"];
}

if(p==="EMBA"){
return ["EMB 500","EMB 501","EMB 502","EMB 510","EMB 520","EMB 601","EMB 602","EMB 620","EMB 650","EMB 660","EMB 670","EMB 690","BUS 700","MAJOR1","MAJOR2","MAJOR3","MAJOR4","MAJOR5","MAJOR6","MAJOR7","MAJOR8"];
}

return [];
}

function addRow(){
let courses=getCourses();
if(!courses.length) return alert("Select program first");

let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<select class="course">${courses.map(c=>`<option>${c}</option>`).join("")}</select>
<select class="grade">
<option>A</option><option>A-</option><option>B+</option><option>B</option>
<option>B-</option><option>C+</option><option>C</option>
<option>F</option><option>Waived</option>
</select>
<button onclick="this.parentElement.remove();calculate()">X</button>
`;

document.getElementById("rows").appendChild(div);
div.querySelectorAll("select").forEach(s=>s.onchange=calculate);
}

function calculate(){

let rows=document.querySelectorAll(".row");
let total=0,credits=0,done=0;

rows.forEach(r=>{
let c=r.querySelector(".course").value;
let g=r.querySelector(".grade").value;

if(g==="Waived" || c==="BUS 500") return;

let credit=3;
if(c==="BUS 700") credit=2;

credits+=credit;

if(g!=="F"){
done++;
total+=credit*(gradeMap[g]||0);
}
});

let cgpa=credits?(total/credits).toFixed(2):"0.00";

document.getElementById("cgpa").innerText=cgpa;
document.getElementById("credits").innerText=credits;

/* PROGRESS % */
let percent=Math.min((done/20)*100,100);
document.getElementById("bar").style.width=percent+"%";

/* STATUS */
if(cgpa>=2.75 && percent===100){
document.getElementById("status").innerText="✅ Eligible for Degree";
}else{
document.getElementById("status").innerText="❌ Degree Not Completed";
}
}

function clearAll(){
document.getElementById("rows").innerHTML="";
calculate();
}

function resetAll(){
clearAll();
}

</script>

</body>
</html>
