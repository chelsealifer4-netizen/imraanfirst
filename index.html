<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NSU E/MBA CGPA ESTIMATOR</title>

<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Josefin Sans';
background:linear-gradient(135deg,#0b1f3a,#123a7a);
color:white;
display:flex;
justify-content:center;
padding:30px;
}

.container{
width:720px;
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:20px;
}

.header{text-align:center;position:relative;}
.logo-left{position:absolute;left:0;top:50%;transform:translateY(-50%);width:60px;}
.logo-right{position:absolute;right:0;top:50%;transform:translateY(-50%);width:55px;}

h1{color:#7ecbff;margin:0;}
.sub{font-size:13px;}

.nav{text-align:center;margin:10px 0;}
.nav a{
margin:3px;padding:5px 10px;
background:#66b2ff;border-radius:20px;
color:white;text-decoration:none;font-size:12px;
}

.select-row{display:flex;gap:6px;margin-bottom:10px;}
select{flex:1;padding:6px;border-radius:6px;border:none;}
#batch{display:none;}

.grid{display:flex;gap:10px;}
.panel{flex:1;background:rgba(255,255,255,0.08);padding:10px;border-radius:10px;}

#rows{max-height:220px;overflow-y:auto;}

.row{display:flex;gap:5px;margin:4px 0;}
.row select{flex:1;}

button{padding:4px 6px;font-size:11px;border:none;border-radius:5px;background:#66b2ff;color:white;cursor:pointer;}
.clear{background:red;}

.result{display:flex;justify-content:space-between;margin-top:5px;}

.progress-bar{height:12px;background:#ccc;border-radius:10px;margin:5px 0;}
.progress-fill{height:100%;background:#00e676;width:0%;}

.level{font-size:12px;margin:3px 0;}
.done{color:#00e676;}
.notdone{color:#ff5252;}

.advisor{
margin-top:6px;
background:rgba(255,255,255,0.1);
padding:8px;
border-radius:8px;
font-size:12px;
white-space:pre-line;
}

.simulator{
margin-top:8px;
background:rgba(0,0,0,0.3);
padding:8px;
border-radius:8px;
font-size:12px;
}

.progress-container{
margin-top:10px;
background:rgba(255,255,255,0.1);
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<img src="nsulogo.jpg" class="logo-left">
<img src="sbe-logo.png" class="logo-right">
<h1>NSU E/MBA CGPA ESTIMATOR</h1>
<div class="sub">Developed by MBA and EMBA Program</div>
</div>

<div class="nav">
<a href="index.html">Home</a>
<a href="flowchart.html">Course Flowchart</a>
<a href="gpolicy.html">Grading Policy</a>
<a href="help.html">User Guideline</a>
<a href="https://www.northsouth.edu/academic/sbe/mba-emba/" target="_blank">Official</a>
</div>

<div class="grid">

<!-- LEFT -->
<div class="panel">

<div class="select-row">
<select id="program" onchange="handleProgram()">
<option value="">Select Program</option>
<option>MBA</option>
<option>EMBA</option>
</select>

<select id="batch" onchange="handleBatch()">
<option value="">Select Batch</option>
<option value="new">After 2019</option>
<option value="old">2019 or Previous</option>
</select>
</div>

<div id="rows"></div>

<button onclick="addRow()">Add</button>
<button class="clear" onclick="clearAll()">Clear</button>

<div class="result">
<div>CGPA: <span id="cgpa">0.00</span></div>
<div>Credits: <span id="credits">0</span></div>
</div>

</div>

<!-- RIGHT -->
<div class="panel">

<!-- EXISTING PROGRESS -->
<div class="progress-container">
<div class="progress-bar"><div id="bar" class="progress-fill"></div></div>
<div id="levels"></div>
</div>

<!-- NEW AI LEVEL PROGRESS -->
<div class="progress-container">
<div style="font-size:13px;margin-bottom:5px;">🧠 AI Level Progress</div>
<div class="progress-bar"><div id="aiBar" class="progress-fill"></div></div>
<div id="aiLevels"></div>
<div id="degreeMsg" style="margin-top:6px;font-size:12px;"></div>
</div>

<div id="advisor" class="advisor"></div>
<div id="simulator" class="simulator"></div>
<div id="status"></div>

</div>

</div>

</div>

<script>

let gradeMap={
"A":4,"A-":3.7,"B+":3.3,"B":3,"B-":2.7,
"C+":2.3,"C":2,"C-":1.7,"D+":1.3,"D":1,"F":0,"Waived":0
};

function handleProgram(){
let p=document.getElementById("program").value;
document.getElementById("batch").style.display=(p==="MBA")?"block":"none";
clearAll();
}

function handleBatch(){ clearAll(); }

function getCourses(){
let p=document.getElementById("program").value;
let b=document.getElementById("batch").value;

let majors=["MAJOR1","MAJOR2","MAJOR3","MAJOR4","MAJOR5","MAJOR6","MAJOR7","MAJOR8"];

if(p==="MBA"){
if(b==="new") return ["BUS 500","BUS 501","BUS 505","BUS 511","BUS 516","BUS 518","BUS 520","BUS 525","BUS 530","BUS 535","BUS 601","BUS 620","BUS 635","BUS 650","BUS 685","BUS 690","BUS 698","BUS 699","Open Elective",...majors];
if(b==="old") return ["BUS 500","BUS 501","BUS 505","BUS 511","BUS 516","BUS 518","BUS 520","BUS 525","BUS 530","BUS 601","BUS 620","BUS 635","BUS 650","BUS 685","BUS 690","BUS 698","Open Elective 1","Open Elective 2",...majors];
}
if(p==="EMBA"){
return ["EMB 500","EMB 501","EMB 502","EMB 510","EMB 520","EMB 601","EMB 602","EMB 620","EMB 650","EMB 660","EMB 670","EMB 690","BUS 700",...majors];
}
return [];
}

function addRow(){
let p=document.getElementById("program").value;
let b=document.getElementById("batch").value;

if(!p) return alert("Select Program first");
if(p==="MBA"&&!b) return alert("Select Batch first");

let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<select class="course">
<option value="">Select Course</option>
${getCourses().map(c=>`<option>${c}</option>`)}
</select>

<select class="grade">
<option value="">Select Grade</option>
<option>A</option><option>A-</option><option>B+</option><option>B</option><option>B-</option>
<option>C+</option><option>C</option><option>C-</option><option>D+</option><option>D</option>
<option>F</option><option>Waived</option>
</select>

<button onclick="this.parentElement.remove();calculate()">X</button>
`;

document.getElementById("rows").appendChild(div);
div.querySelectorAll("select").forEach(s=>s.onchange=calculate);
}

function calculate(){

let rows=document.querySelectorAll(".row");
let passed={},failed={},waived={};
let totalPoints=0,totalCredits=0;

rows.forEach(r=>{
let c=r.querySelector(".course").value;
let g=r.querySelector(".grade").value;
if(!c||!g)return;

let credit=3;
let program=document.getElementById("program").value;
let batch=document.getElementById("batch").value;

if(c==="BUS 500") credit=0;
if(program==="EMBA" && c==="BUS 700") credit=2;
if(program==="MBA"){
if(batch==="old" && c==="BUS 698") credit=1;
if(batch==="new" && c==="BUS 698") credit=0;
}

if(g==="Waived") waived[c]=true;
else if(g==="F") failed[c]=true;
else{
passed[c]=true;
totalCredits+=credit;
totalPoints+=credit*gradeMap[g];
}
});

let cgpa=totalCredits?(totalPoints/totalCredits).toFixed(2):"0.00";

document.getElementById("cgpa").innerText=cgpa;
document.getElementById("credits").innerText=totalCredits;

/* SIMULATOR */
let simA=((totalPoints+12)/(totalCredits+3)).toFixed(2);
let simB=((totalPoints+9)/(totalCredits+3)).toFixed(2);

document.getElementById("simulator").innerText=
`📊 Next Course Prediction:
If A → CGPA: ${simA}
If B → CGPA: ${simB}`;

/* AI ADVISOR */
let aiAdvice="";
if(cgpa>=3.7) aiAdvice="🔥 Excellent performance.";
else if(cgpa>=3.3) aiAdvice="💡 Doing well.";
else if(cgpa>=3.0) aiAdvice="⚠️ Improve performance.";
else if(cgpa>=2.75) aiAdvice="📘 Maintain carefully.";
else aiAdvice="🚨 Critical zone.";

document.getElementById("advisor").innerText=aiAdvice;

/* NEW AI LEVEL PROGRESS */
let aiPercent=0, html="", ready=false;
let program=document.getElementById("program").value;

if(program==="MBA"){
let f=["BUS 500","BUS 501","BUS 505","BUS 511","BUS 516","BUS 518","BUS 520","BUS 525","BUS 530","BUS 535"];
let a=["BUS 601","BUS 620","BUS 635","BUS 650","BUS 685","BUS 690"];
let m=["MAJOR1","MAJOR2","MAJOR3","MAJOR4"];

let fC=f.filter(c=>passed[c]||waived[c]).length;
let aC=a.filter(c=>passed[c]).length;
let mC=m.filter(c=>passed[c]).length;

let fD=fC===f.length, aD=aC===a.length, mD=mC===4;
let eD=passed["Open Elective"]||passed["BUS 698"]||passed["BUS 699"];

if(fD)aiPercent+=25;
if(aD)aiPercent+=25;
if(mD)aiPercent+=25;
if(eD)aiPercent+=25;

html=`
<div class="${fD?'done':'notdone'}">Foundation ${fC}/${f.length}</div>
<div class="${aD?'done':'notdone'}">Advanced ${aC}/${a.length}</div>
<div class="${mD?'done':'notdone'}">Major ${mC}/4</div>
<div class="${eD?'done':'notdone'}">Elective</div>
`;

ready=fD&&aD&&mD&&eD&&cgpa>=2.75;
}

if(program==="EMBA"){
let f=["EMB 500","EMB 501","EMB 502","EMB 510","EMB 520"];
let func=["EMB 601","EMB 602","EMB 620","EMB 650","EMB 660","EMB 670","EMB 690","BUS 700"];
let m=["MAJOR1","MAJOR2","MAJOR3","MAJOR4"];

let fC=f.filter(c=>passed[c]).length;
let funcC=func.filter(c=>passed[c]).length;
let mC=m.filter(c=>passed[c]).length;

let fD=fC===5, funcD=funcC===8, mD=mC===4;

if(fD)aiPercent+=33;
if(funcD)aiPercent+=33;
if(mD)aiPercent+=34;

html=`
<div class="${fD?'done':'notdone'}">Foundation ${fC}/5</div>
<div class="${funcD?'done':'notdone'}">Functional ${funcC}/8</div>
<div class="${mD?'done':'notdone'}">Major ${mC}/4</div>
`;

ready=fD&&funcD&&mD&&cgpa>=2.75;
}

document.getElementById("aiBar").style.width=aiPercent+"%";
document.getElementById("aiLevels").innerHTML=html;
document.getElementById("degreeMsg").innerText=
ready?"🎓 NOW YOU CAN APPLY DEGREE ANALYSIS":"";

document.getElementById("status").innerText =
(cgpa>=2.75) ? "✅ On Track" : "❌ Risk Zone";

}

function clearAll(){
document.getElementById("rows").innerHTML="";
document.getElementById("simulator").innerText="";
calculate();
}

</script>

</body>
</html>
